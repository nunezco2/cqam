# Hypothetical Photonic Processor (Fusion-Based)
#
# A measurement-based photonic architecture using dual-rail encoded
# photons, linear-optical fusion gates, and single-photon detectors.
# Resource states generated by quantum dot sources, entangled via
# type-II fusion operations on a silicon photonic chip.
#
# Usage:
#   cargo run --bin cqam-run -- program.cqam --noise examples/noise_profiles/photonic_fusion.toml --shots 1000

modality = "photonic"

# Photon loss budget
loss_per_component = 0.05  # 5% loss per optical element (coupling, waveguide, switch)
components_per_single_gate = 4   # beam splitter + phase shifter + routing
components_per_two_gate = 8      # fusion gate: two BSs + detectors + feed-forward

# Detection
detector_efficiency = 0.92       # superconducting nanowire SPDs at 0.8 K
dark_count_prob = 1e-6           # ~100 Hz dark rate at 1 GHz clock

# Interference quality
hom_visibility = 0.97            # Hong-Ou-Mandel dip from quantum dot sources
phase_error_std = 0.01           # rms phase instability in on-chip MZIs

# Fusion operations
fusion_success_prob = 0.45       # type-II fusion with realistic loss and distinguishability
