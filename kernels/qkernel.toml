[[kernel]]
name = "QFourier"
instruction = "QFourier"
description = "Applies Quantum Fourier Transform to a quantum register."
interference = "high"
entropy = "neutral"
signal_amplification = "medium"
entanglement_mode = "global"
qasm_template = "kernels/qasm_templates/qfourier.qasm"

[[kernel]]
name = "QOracle"
instruction = "QOracle"
description = "Applies a black-box oracle function to a quantum register."
interference = "low"
entropy = "neutral"
signal_amplification = "problem-dependent"
entanglement_mode = "local"
qasm_template = "kernels/qasm_templates/qoracle.qasm"

[[kernel]]
name = "QPhaseKick"
instruction = "QPhaseKick"
description = "Applies a global or conditional phase shift to the ensemble."
interference = "high"
entropy = "neutral"
signal_amplification = "high"
entanglement_mode = "none"
qasm_template = "kernels/qasm_templates/qphasekick.qasm"

[[kernel]]
name = "QDiffuse"
instruction = "QDiffuse"
description = "Applies Grover's diffusion operator (inversion about the mean)."
interference = "high"
entropy = "neutral"
signal_amplification = "high"
entanglement_mode = "global"
qasm_template = "kernels/qasm_templates/qdiffuse.qasm"

[[kernel]]
name = "QReflect"
instruction = "QReflect"
description = "Reflects ensemble around reference state."
interference = "medium"
entropy = "neutral"
signal_amplification = "medium"
entanglement_mode = "local"
qasm_template = "kernels/qasm_templates/qreflect.qasm"

[[kernel]]
name = "QEntangle"
instruction = "QEntangle"
description = "Generates GHZ or Bell-type entanglement structures across ensemble."
interference = "medium"
entropy = "neutral"
signal_amplification = "low"
entanglement_mode = "global"
qasm_template = "kernels/qasm_templates/qentangle.qasm"

[[kernel]]
name = "QSwapNet"
instruction = "QSwapNet"
description = "Applies qubit swaps based on a defined network topology."
interference = "neutral"
entropy = "neutral"
signal_amplification = "none"
entanglement_mode = "local"
qasm_template = "kernels/qasm_templates/qswapnet.qasm"

[[kernel]]
name = "QWalkStep"
instruction = "QWalkStep"
description = "Applies a step in a quantum walk evolution."
interference = "medium"
entropy = "slight-increase"
signal_amplification = "medium"
entanglement_mode = "problem-dependent"
qasm_template = "kernels/qasm_templates/qwalkstep.qasm"

[[kernel]]
name = "QParityMeasure"
instruction = "QParityMeasure"
description = "Measures parity observable and stores reduction in classical register."
interference = "medium"
entropy = "slight-decrease"
signal_amplification = "medium"
entanglement_mode = "local"
qasm_template = "kernels/qasm_templates/qparitymeasure.qasm"

[[kernel]]
name = "QApplyUnitary"
instruction = "QApplyUnitary"
description = "Applies arbitrary unitary transformation from kernel library."
interference = "variable"
entropy = "variable"
signal_amplification = "variable"
entanglement_mode = "any"
qasm_template = "kernels/qasm_templates/qapplyunitary.qasm"

[[kernel]]
name = "QPhaseAmplify"
instruction = "QPhaseAmplify"
description = "Amplifies state amplitudes using phase rotations."
interference = "high"
entropy = "neutral"
signal_amplification = "high"
entanglement_mode = "hybrid"
qasm_template = "kernels/qasm_templates/qphaseamplify.qasm"

[[kernel]]
name = "QGroverIter"
instruction = "QGroverIter"
description = "Performs one iteration of Grover search (oracle + diffusion)."
interference = "high"
entropy = "slight-decrease"
signal_amplification = "very-high"
entanglement_mode = "global"
qasm_template = "kernels/qasm_templates/qgroveriter.qasm"
